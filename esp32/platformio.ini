[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.7.0
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    ; Configure at build time — override on the PIO CLI with --build-flag:
    -DDANMX_MAX_PIXELS=300
    -DDANMX_LED_PIN=5
    -DDANMX_UDP_PORT=6454
build_unflags = -std=gnu++11

[env:native-test]
platform = native
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DDANMX_MAX_PIXELS=2048
test_framework = unity
